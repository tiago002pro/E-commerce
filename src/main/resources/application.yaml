server:
  port: 8080

spring:
  application:
    name: ecommerce-api

  datasource:
    url: jdbc:postgresql://localhost:9091/ecommerce
    username: ecommerce
    password: 123
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  logging:
    level:
      org.flywaydb: DEBUG

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

